<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#FFFFFF">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Brainy">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
<title>Brainy Workplace</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#fff;--border:#E9E9E7;--text:#2F2F2F;--sub:#9B9A97;--accent:#2F2F2F;--al:#F1F1EF;--ad:#1A1A1A;--danger:#E03E3E;--blue:#337EA9;--purple:#9065B0;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans KR',sans-serif;background:#fff;color:var(--text);min-height:100vh;-webkit-tap-highlight-color:transparent;}
button{border:none;background:none;cursor:pointer;font-family:inherit;}
input,select,textarea{font-family:inherit;outline:none;}
a{color:var(--blue);text-decoration:none;}
.topbar{position:fixed;top:0;left:0;right:0;z-index:60;background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:52px;}
.topbar h1{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:var(--text);}
.topbar .right{display:flex;align-items:center;gap:8px;}
.topbar .ds{font-size:10px;color:var(--sub);}
.lo-btn{padding:6px 12px;border-radius:8px;font-size:11px;font-weight:600;color:var(--accent);border:1px solid var(--accent);}
.lo-btn:active{background:var(--al);}
.bottom-tab{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border);z-index:50;display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.bottom-tab::-webkit-scrollbar{display:none;}
.bottom-tab button{flex:1 1 0;display:flex;flex-direction:column;align-items:center;gap:2px;padding:7px 4px 9px;min-width:0;font-size:10px;font-weight:400;color:var(--sub);white-space:nowrap;}
.bottom-tab button.active{color:var(--accent);font-weight:600;}
.bottom-tab button svg{width:20px;height:20px;}
.mw{padding-top:52px;padding-bottom:68px;}
.main{padding:14px 16px 20px;max-width:800px;margin:0 auto;}
.sec{display:none;}.sec.active{display:block;}
.lock-screen{position:fixed;inset:0;background:#fff;z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;}
.lock-screen h1{font-family:'Playfair Display',serif;font-size:26px;font-weight:700;margin-bottom:6px;}
.lock-sub{font-size:13px;color:var(--sub);margin-bottom:28px;}
.lock-icon{margin-bottom:20px;color:var(--text);display:flex;align-items:center;justify-content:center;}
.pin-dots{display:flex;gap:12px;margin-bottom:20px;}
.pin-dot{width:14px;height:14px;border-radius:7px;border:2px solid var(--border);transition:all .2s;}
.pin-dot.filled{background:var(--accent);border-color:var(--accent);}
.pin-dot.error{background:var(--danger);border-color:var(--danger);animation:shake .4s;}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
.pin-pad{display:grid;grid-template-columns:repeat(3,72px);gap:10px;}
.pin-key{width:72px;height:50px;border-radius:12px;font-size:22px;font-weight:500;background:#F9FAFB;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--text);}
.pin-key:active{background:var(--al);}
.pin-key.fn{font-size:14px;color:var(--sub);border:none;background:transparent;}
.lock-error{color:var(--danger);font-size:12px;margin-top:10px;height:16px;}
.card{background:#fff;border-radius:12px;padding:16px;border:1px solid var(--border);margin-bottom:10px;}
.bp{padding:10px 16px;border-radius:8px;font-size:13px;font-weight:600;background:var(--accent);color:#fff;}
.bp:hover{background:var(--ad);}
.be{color:var(--blue);font-size:12px;}.bd{color:var(--danger);font-size:12px;}
.em{text-align:center;padding:32px 16px;color:var(--sub);font-size:12px;}
.sh{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.sh h2{font-size:17px;font-weight:600;}
.ir{display:flex;gap:6px;margin-bottom:10px;}
.ir input{flex:1;padding:10px 12px;border:1px solid var(--border);border-radius:9px;font-size:13px;background:#fff;}
.ir input:focus{border-color:var(--text);outline:none;}
.ir .bp{padding:10px 14px;font-size:13px;font-weight:500;}
.ti{display:flex;align-items:flex-start;gap:8px;padding:11px 12px;background:#fff;border-radius:9px;border:1px solid #EFEEEC;margin-bottom:5px;transition:border-color .15s;}
.ti:hover{border-color:var(--border);}
.ti.done{opacity:.5;}.ti.pri{border-left:2px solid var(--text);}
.tt{flex:1;font-size:14px;}.tt.dn{text-decoration:line-through;color:var(--sub);}
.cb{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--sub);display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;margin-top:1px;}
.cb.chk{background:var(--accent);border-color:var(--accent);}
.cb.chk::after{content:'✓';color:#fff;font-size:12px;font-weight:700;}
.pb{height:6px;background:var(--border);border-radius:3px;overflow:hidden;}
.pf{height:100%;background:var(--accent);border-radius:3px;transition:width .3s;}
.dn2{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.dn2 button{padding:6px 8px;font-size:18px;color:var(--sub);}
.dn2 .ctr{text-align:center;}.dn2 .ctr .dtl{font-size:15px;font-weight:600;}.dn2 .ctr .tbd{font-size:10px;color:var(--sub);font-weight:500;background:var(--al);padding:1px 8px;border-radius:8px;display:inline-block;margin-top:2px;}
.vt{display:inline-flex;gap:2px;margin-bottom:14px;background:var(--al);padding:3px;border-radius:8px;}
.vt button{padding:5px 14px;border-radius:6px;font-size:12px;color:var(--sub);}
.vt button.active{background:#fff;color:var(--text);font-weight:600;box-shadow:0 1px 2px rgba(0,0,0,.04);}
.wg{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:16px;}
.wc{padding:10px 4px;text-align:center;border-radius:10px;background:#fff;border:1px solid var(--border);cursor:pointer;}
.wc.sel{background:var(--accent);color:#fff;border-color:var(--accent);}
.wc.tod:not(.sel){border:2px solid var(--accent);}
/* Weekly Planner */
.wp{border:1.5px solid #B8C4D0;border-radius:8px;overflow:hidden;margin-bottom:16px;background:#fff;}
.wp-title{text-align:center;font-size:13px;font-weight:700;letter-spacing:2px;padding:8px;color:var(--text);border-bottom:1.5px solid #B8C4D0;background:#F8FAFB;}
.wp-wl{padding:10px 12px;border-bottom:1.5px solid #B8C4D0;background:#fff;}
.wp-wl-title{font-size:11px;font-weight:600;color:var(--text);margin-bottom:6px;display:flex;align-items:center;gap:5px;}
.wp-wl-add input{width:100%;border:none;border-bottom:1px dashed #B8C4D0;font-size:12px;padding:4px 0;outline:none;background:transparent;font-family:inherit;margin-top:4px;}
.wp-days{display:flex;flex-direction:column;}
.wp-day{display:flex;border-bottom:1px solid #E8ECF0;min-height:50px;}
.wp-day:last-child{border-bottom:none;}
.wp-day-hdr{width:80px;flex-shrink:0;padding:8px;background:#F8FAFB;border-right:1px solid #E8ECF0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.wp-day-hdr .wp-day-label{font-size:11px;font-weight:600;color:var(--text);}
.wp-day-hdr .wp-day-date{font-size:10px;color:var(--sub);margin-top:2px;}
.wp-day-hdr.is-today .wp-day-label{color:var(--accent);}
.wp-day-hdr.is-today .wp-day-date{color:var(--accent);font-weight:600;}
.wp-day-content{flex:1;padding:6px 10px;position:relative;}
.wp-item{display:flex;align-items:flex-start;gap:5px;margin-bottom:3px;font-size:12px;line-height:1.4;}
.wp-item .wp-cb{width:13px;height:13px;border-radius:3px;border:1.5px solid #B8C4D0;flex-shrink:0;margin-top:1px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.wp-item .wp-cb.chk{background:var(--accent);border-color:var(--accent);}
.wp-item .wp-cb.chk::after{content:'✓';color:#fff;font-size:8px;font-weight:700;}
.wp-item .wp-tx{color:var(--text);word-break:break-all;cursor:pointer;flex:1;}
.wp-item .wp-tx.dn{text-decoration:line-through;color:var(--sub);}
.wp-item .wp-del{color:var(--border);font-size:12px;cursor:pointer;flex-shrink:0;padding:0 2px;}
.wp-item .wp-del:active{color:var(--danger);}
.wp-day-add input{width:100%;border:none;border-bottom:1px dashed var(--border);font-size:11px;padding:3px 0;outline:none;background:transparent;font-family:inherit;margin-top:2px;}
.wp-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.wp-nav button{padding:6px;font-size:18px;color:var(--sub);}
.wp-nav .wp-ntl{font-size:14px;font-weight:600;text-align:center;}
.wc .wd{font-size:10px;opacity:.7;}.wc .wn{font-size:15px;font-weight:600;margin:2px 0;}.wc .wt{font-size:9px;color:var(--sub);}.wc.sel .wt{color:rgba(255,255,255,.8);}
.sb2{padding:2px 4px;display:inline-flex;align-items:center;margin-top:-1px;}.son{color:var(--text);}.sof{color:#D4D2CD;}
.db2{font-size:16px;padding:0 4px;color:#C4C2BD;align-self:flex-start;line-height:1.2;margin-top:-1px;}
.db2:hover{color:var(--danger);}
.dh{cursor:grab;color:#C4C2BD;padding:2px 2px;touch-action:none;user-select:none;flex-shrink:0;display:inline-flex;align-items:center;margin-top:1px;}
.dh:active{cursor:grabbing;color:var(--text);}
.ti.dragging,.jc.dragging,.ic.dragging,.folder.dragging{opacity:.4;background:#F0FAF3;}
.ti.drag-over,.jc.drag-over,.ic.drag-over,.folder.drag-over{border-top:2px solid var(--accent);margin-top:-2px;}
.edt-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px;}
.edt-box{background:#fff;border-radius:16px;padding:24px;width:100%;max-width:400px;}
.stb{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;display:inline-block;}
.sts{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
.jc{background:#fff;border-radius:12px;padding:16px;border:1px solid var(--border);margin-bottom:10px;border-left:4px solid var(--accent);}
.jd{display:flex;flex-wrap:wrap;gap:12px;margin-top:10px;font-size:12px;color:var(--sub);}
.jn{margin-top:8px;font-size:12px;color:var(--sub);background:#F9FAFB;padding:6px 10px;border-radius:6px;}
.ja{display:flex;gap:8px;margin-top:10px;}
.cc2{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;align-items:center;}
.ccp{padding:5px 12px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid var(--border);background:#fff;color:var(--sub);}
.ic{background:#fff;border-radius:12px;padding:16px;border:1px solid var(--border);margin-bottom:10px;}
.itg{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:500;margin-top:4px;}
.iht{padding:2px 8px;border-radius:10px;font-size:10px;background:var(--al);color:var(--ad);display:inline-block;margin:2px;}
.aci{display:inline-flex;gap:4px;align-items:center;}.aci input{padding:4px 10px;border:1px solid var(--border);border-radius:8px;font-size:12px;width:100px;}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px;}
.mb{background:#fff;border-radius:16px;padding:24px;width:100%;max-width:420px;max-height:85vh;overflow-y:auto;}
.mb h3{font-size:16px;font-weight:600;margin-bottom:16px;}
.fg{margin-bottom:10px;}.fg label{font-size:12px;color:var(--sub);display:block;margin-bottom:4px;}
.fg input,.fg select,.fg textarea{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:8px;font-size:13px;background:#fff;}
.fg textarea{resize:vertical;}
.fb{display:flex;gap:8px;margin-top:16px;}.fb button{flex:1;padding:10px 0;border-radius:8px;font-size:13px;font-weight:600;}
.fb .sv{background:var(--accent);color:#fff;}.fb .cn{background:var(--border);color:var(--text);}
.fab{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:7px;font-size:11px;color:var(--sub);border:1px dashed var(--border);cursor:pointer;background:transparent;}
.fab:hover{background:var(--al);color:var(--text);border-color:var(--sub);}
.fl{margin-top:8px;display:flex;flex-direction:column;gap:6px;}
.fi{display:flex;align-items:center;gap:8px;padding:8px 10px;background:#F9FAFB;border-radius:8px;border:1px solid var(--border);}
.ft{width:40px;height:40px;border-radius:6px;background:var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:16px;overflow:hidden;}
.ft img{width:100%;height:100%;object-fit:cover;}
.fn2{flex:1;font-size:12px;word-break:break-all;}
.fdl{font-size:14px;color:var(--danger);cursor:pointer;padding:4px;}
.pov{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;}
.pov img{max-width:95%;max-height:85vh;border-radius:8px;object-fit:contain;}
.pcl{position:fixed;top:16px;right:16px;z-index:201;color:#fff;font-size:28px;cursor:pointer;background:rgba(0,0,0,.4);width:36px;height:36px;border-radius:18px;display:flex;align-items:center;justify-content:center;}
.pov iframe{width:95%;height:85vh;border:none;border-radius:8px;background:#fff;}
.cf{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;}
.cft{width:48px;height:48px;border-radius:6px;overflow:hidden;cursor:pointer;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;background:#F9FAFB;font-size:11px;color:var(--sub);}
.cft img{width:100%;height:100%;object-fit:cover;}
.cln{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.cln button{padding:8px;font-size:18px;color:var(--sub);}.cln h2{font-size:17px;font-weight:600;}
.clg{display:flex;gap:10px;margin-bottom:12px;justify-content:center;flex-wrap:wrap;}
.cli{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--sub);}
.cld{width:8px;height:8px;border-radius:4px;}
.cgr{background:#fff;border-radius:12px;border:1px solid var(--border);overflow:hidden;}
.chd{display:grid;grid-template-columns:repeat(7,1fr);}
.chd div{padding:8px 0;text-align:center;font-size:11px;font-weight:600;background:#F9FAFB;color:var(--sub);}
.chd div:first-child{color:var(--danger);}.chd div:last-child{color:var(--blue);}
.cbd{display:grid;grid-template-columns:repeat(7,1fr);}
.ccl{min-height:48px;padding:4px 2px;display:flex;flex-direction:column;align-items:center;border-bottom:1px solid var(--border);cursor:pointer;}
.ccl:not(:nth-child(7n)){border-right:1px solid var(--border);}
.ccl.csl{background:var(--al);}
.ccl .cnm{font-size:13px;width:24px;height:24px;display:flex;align-items:center;justify-content:center;border-radius:12px;}
.ccl .cnm.ctd{background:var(--accent);color:#fff;font-weight:700;}
.ccl .cnm.csn{color:var(--danger);}.ccl .cnm.cst{color:var(--blue);}
.cdt{display:flex;gap:2px;margin-top:2px;flex-wrap:wrap;justify-content:center;}
.cdot{width:5px;height:5px;border-radius:3px;}
.cev{margin-top:16px;}.cev h3{font-size:14px;font-weight:600;margin-bottom:10px;}
.cevi{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#fff;border-radius:8px;border:1px solid var(--border);margin-bottom:6px;}
.cl-section{margin-top:14px;}
.cl-section:first-child{margin-top:0;}
.cl-section-h{font-size:12px;font-weight:600;color:var(--text);margin-bottom:8px;display:flex;align-items:center;gap:5px;}
.cl-todo-item{display:flex;align-items:flex-start;gap:8px;padding:10px 12px;background:#fff;border-radius:8px;border:1px solid var(--border);margin-bottom:6px;}
.cl-todo-item.done{opacity:.55;}
.cl-todo-text{font-size:13px;color:var(--text);cursor:pointer;display:inline-block;}
.cl-todo-text.dn{text-decoration:line-through;color:var(--sub);}
.cl-todo-meta{display:flex;gap:6px;margin-top:4px;}
.cl-todo-gtd,.cl-todo-foc{font-size:10px;font-weight:600;}
.cl-todo-del{font-size:16px;color:var(--border);cursor:pointer;background:none;border:none;padding:0 2px;line-height:1;}
.cl-todo-del:active{color:var(--danger);}
.cedt{width:8px;height:8px;border-radius:4px;flex-shrink:0;}
.stc{background:#fff;border-radius:12px;padding:20px;border:1px solid var(--border);margin-bottom:12px;}
.stc h3{font-size:14px;font-weight:600;margin-bottom:12px;}
.str{padding:12px 0;border-bottom:1px solid var(--border);}.str:last-child{border-bottom:none;}
.str label{font-size:13px;color:var(--text);display:block;margin-bottom:6px;}
.sti{padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;width:100%;}
.smg{font-size:12px;margin-top:6px;padding:6px 10px;border-radius:6px;}
.smg.ok{color:var(--accent);background:var(--al);}.smg.er{color:var(--danger);background:#FDECEA;}
.dz{margin-top:20px;padding:16px;border:1px solid var(--danger);border-radius:12px;background:#FFF5F4;}
.dz h4{font-size:13px;color:var(--danger);margin-bottom:8px;}
.dz button{padding:8px 16px;border-radius:8px;font-size:12px;font-weight:600;background:var(--danger);color:#fff;}
.folder-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:8px;}
.folder{position:relative;background:transparent;border:none;padding:10px 4px 8px;cursor:pointer;transition:all .15s;text-align:center;min-height:120px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;gap:6px;}
.folder:active{transform:scale(.94);opacity:.7;}
.folder-name{font-size:12px;font-weight:600;color:var(--text);word-break:break-all;line-height:1.3;}
.folder-count{font-size:10px;color:var(--sub);}
.folder-back{display:flex;align-items:center;gap:6px;margin-bottom:14px;cursor:pointer;color:var(--text);font-size:14px;font-weight:500;}
.folder-back:active{opacity:.7;}
.folder-add{position:relative;background:transparent;border:none;padding:10px 4px 8px;cursor:pointer;text-align:center;min-height:120px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;gap:6px;}
.folder-add-inline{display:flex;flex-direction:column;align-items:center;padding:10px 4px 8px;min-height:120px;gap:4px;}
.folder-add-inline input:focus{outline:none;border-bottom-color:var(--text);}
.folder-add:active{opacity:.5;}
.folder-add .folder-name{color:var(--sub);font-weight:400;}
.folder-add-icon{width:72px;height:72px;border-radius:14px;background:#F5F5F4;color:var(--sub);font-size:36px;display:flex;align-items:center;justify-content:center;font-weight:300;}
.color-palette{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-top:8px;}
.color-dot{width:24px;height:24px;border-radius:12px;cursor:pointer;border:2px solid transparent;transition:all .15s;}
.color-dot:active{transform:scale(.9);}
.color-dot.sel{border-color:var(--text);box-shadow:0 0 0 2px #fff inset;}
/* ── 프로젝트 ── */
.prj-tabs{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:2px;}
.prj-tabs::-webkit-scrollbar{display:none;}
.prj-tabs button{padding:6px 14px;border-radius:18px;font-size:12px;color:var(--sub);background:#F5F6F7;white-space:nowrap;border:1px solid transparent;}
.prj-tabs button.active{background:var(--al);color:var(--ad);font-weight:600;border-color:var(--accent);}
.prj-card{background:#fff;border-radius:12px;padding:14px;border:1px solid var(--border);margin-bottom:10px;border-left:4px solid var(--accent);cursor:pointer;}
.prj-card:active{background:#FAFBFC;}
.prj-card.archived{opacity:.55;}
.prj-card.paused{opacity:.75;background:#FAFBFC;}
.prj-card-head{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
.prj-card-name{font-size:15px;font-weight:600;color:var(--text);}
.prj-card-cat{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;margin-top:4px;}

// 콤마 들어간 문자열 → 숫자
function parseAmt(s){if(!s)return 0;return parseFloat(String(s).replace(/[^\d.-]/g,''))||0;}
// 입력 중 자동으로 콤마 추가 (input 이벤트에 바인딩)
function setupAmtInput(el){if(!el)return;
const reformat=()=>{const cursor=el.selectionStart;const oldLen=el.value.length;
const num=parseAmt(el.value);el.value=num?num.toLocaleString('ko-KR'):'';
// 커서 위치 보정 (오른쪽 끝 기준이 아닌 자연스럽게)
const newLen=el.value.length;const newPos=Math.max(0,cursor+(newLen-oldLen));
try{el.setSelectionRange(newPos,newPos);}catch{}};
el.addEventListener('input',reformat);
// 초기 포매팅
if(el.value)reformat();}

// 도넛 차트: data = [[label, value, color], ...]
function svgDonut(data,size){const total=data.reduce((s,[,v])=>s+v,0);if(!total)return'';
const sz=size||140,cx=sz/2,cy=sz/2,r=sz*0.4,ir=sz*0.26;
let acc=0;const paths=[];
data.forEach(([,v,c])=>{const start=acc/total*Math.PI*2-Math.PI/2;const end=(acc+v)/total*Math.PI*2-Math.PI/2;acc+=v;
const x1=cx+r*Math.cos(start),y1=cy+r*Math.sin(start);
const x2=cx+r*Math.cos(end),y2=cy+r*Math.sin(end);
const ix1=cx+ir*Math.cos(end),iy1=cy+ir*Math.sin(end);
const ix2=cx+ir*Math.cos(start),iy2=cy+ir*Math.sin(start);
const large=(end-start)>Math.PI?1:0;
paths.push(`<path d="M ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2} L ${ix1} ${iy1} A ${ir} ${ir} 0 ${large} 0 ${ix2} ${iy2} Z" fill="${c}"/>`);});
return`<svg width="${sz}" height="${sz}" viewBox="0 0 ${sz} ${sz}" style="display:block">${paths.join('')}</svg>`;}

// 막대 그래프: data = [{label, income, expense}], 너비는 컨테이너 100%
function svgBars(data,height){if(!data.length)return'';
const h=height||120,padTop=6,padBot=24,chartH=h-padTop-padBot;
const maxVal=Math.max(...data.map(d=>Math.max(d.income||0,d.expense||0)),1);
const w=300;const groupW=w/data.length;const barW=Math.min(groupW*0.32,18);
let bars='';
data.forEach((d,i)=>{const cx=groupW*i+groupW/2;
const incH=(d.income||0)/maxVal*chartH;
const expH=(d.expense||0)/maxVal*chartH;
bars+=`<rect x="${cx-barW-1}" y="${padTop+chartH-incH}" width="${barW}" height="${incH}" fill="#0F7B6C" rx="2"/>`;
bars+=`<rect x="${cx+1}" y="${padTop+chartH-expH}" width="${barW}" height="${expH}" fill="#E03E3E" rx="2"/>`;
bars+=`<text x="${cx}" y="${h-6}" text-anchor="middle" font-size="10" fill="#787774">${d.label}</text>`;});
return`<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" style="width:100%;height:${h}px;display:block">${bars}</svg>`;}

// 자산 추이 계산 — 최근 N개월 각 월말 시점의 총자산 (거래내역을 역산)
// 반환: [{label, value(원), ymKey}]
function assetTrend(monthsBack){
const today=new Date();today.setHours(0,0,0,0);
const currentTotal=totalAssets();
// 미래에서 과거로 한 달씩 거슬러가며 자산 역산
// 한 달의 자산 = 다음 달 자산 - 그 달의 (수입+환급-지출-투자) 흐름
const result=[];
let cumNet=currentTotal;
// 이번 달은 오늘까지의 흐름이 이미 잔액에 반영돼있음 → 이번 달 첫 자료점은 currentTotal
result.push({label:String(today.getMonth()+1)+'월',value:currentTotal,ymKey:fD(today).substring(0,7)});
for(let i=1;i<=monthsBack;i++){const d=new Date(today.getFullYear(),today.getMonth()-i+1,1);
// d는 i개월 전의 다음달 1일 (=i개월 전의 말일+1)
const dEnd=new Date(d);dEnd.setDate(dEnd.getDate()-1); // i개월 전의 말일
const dStart=new Date(dEnd.getFullYear(),dEnd.getMonth(),1); // i개월 전의 1일
const startStr=fD(dStart),endStr=fD(dEnd);
// 그 달의 거래 흐름 (income/refund - expense/invest)
const monthFlow=S.txs.filter(t=>t.date>=startStr&&t.date<=endStr).reduce((s,t)=>{
if(t.type==='income'||t.type==='refund')return s+t.amount;
if(t.type==='expense'||t.type==='invest')return s-t.amount;
return s;},0);
cumNet=cumNet-monthFlow; // 그 달 시작 시점의 자산
result.unshift({label:String(dStart.getMonth()+1)+'월',value:cumNet,ymKey:fD(dStart).substring(0,7)});}
return result;}

// 자산 종류별 추이 — 최근 N개월 각 월말 시점의 자산 종류별 잔액
// 반환: {labels:[월명], series:[{kind, label, color, values:[]}]}
function assetTrendByKind(monthsBack){
const today=new Date();today.setHours(0,0,0,0);
// 활성 계좌 종류별 현재 잔액
const kindNow={};
S.accounts.forEach(a=>{if(a.active===false)return;const k=a.kind||'checking';kindNow[k]=(kindNow[k]||0)+(a.balance||0);});
// 종류별 누적 (역산용)
const kindCum={...kindNow};
const labels=[];
const seriesMap={};
Object.keys(kindNow).forEach(k=>{seriesMap[k]={kind:k,label:assetKindLabel(k),color:assetKindColor(k),values:[]};});

// 이번 달부터 과거로 거슬러
labels.push(String(today.getMonth()+1)+'월');
Object.keys(kindNow).forEach(k=>{seriesMap[k].values.push(kindCum[k]||0);});
for(let i=1;i<=monthsBack;i++){
const d=new Date(today.getFullYear(),today.getMonth()-i+1,1);
const dEnd=new Date(d);dEnd.setDate(dEnd.getDate()-1);
const dStart=new Date(dEnd.getFullYear(),dEnd.getMonth(),1);
const startStr=fD(dStart),endStr=fD(dEnd);
// 그 달의 거래 — 계좌별로 분류해서 종류별 흐름 계산
const kindFlow={};
S.txs.filter(t=>t.date>=startStr&&t.date<=endStr).forEach(t=>{
const a=accountById(t.accountId);if(!a)return;
const k=a.kind||'checking';
kindFlow[k]=kindFlow[k]||0;
if(t.type==='income'||t.type==='refund')kindFlow[k]+=t.amount;
else if(t.type==='expense'||t.type==='invest')kindFlow[k]-=t.amount;
// transfer는 계좌간 이동이라 자산 총량 변화 없음 (다만 종류별로는 변화 가능)
// 단순화를 위해 일단 transfer 무시
});
// 종류별 자산 = 다음 달 자산 - 흐름
Object.keys(seriesMap).forEach(k=>{kindCum[k]=(kindCum[k]||0)-(kindFlow[k]||0);seriesMap[k].values.unshift(kindCum[k]);});
labels.unshift(String(dStart.getMonth()+1)+'월');}

// 시리즈가 다 0인 종류는 제거
const series=Object.values(seriesMap).filter(s=>s.values.some(v=>Math.abs(v)>0.01));
return{labels,series};}

// 적층 막대 그래프 - 자산 종류별 추이용
// labels: [월명], series: [{label, color, values}]
function svgStackedBars(labels,series,height){
if(!series.length||!labels.length)return'';
const h=height||140,padTop=10,padBot=22;const chartH=h-padTop-padBot;
const w=320;const groupGap=4;const groupW=(w-(labels.length-1)*groupGap)/labels.length;
// 각 월별 합계의 최대값
const totals=labels.map((_,i)=>series.reduce((s,sr)=>s+Math.max(0,sr.values[i]||0),0));
const maxTotal=Math.max(...totals,1);
let bars='';
labels.forEach((lab,i)=>{const x=i*(groupW+groupGap);
let yAcc=padTop+chartH;
series.forEach(sr=>{const v=Math.max(0,sr.values[i]||0);
if(v<=0)return;
const segH=v/maxTotal*chartH;
yAcc-=segH;
bars+=`<rect x="${x}" y="${yAcc}" width="${groupW}" height="${segH}" fill="${sr.color}" opacity="0.85"/>`;});
bars+=`<text x="${x+groupW/2}" y="${h-6}" text-anchor="middle" font-size="10" fill="#787774">${lab}</text>`;});
return`<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" style="width:100%;height:${h}px;display:block">${bars}</svg>`;}

// 선그래프 SVG - data: [{label, value}]
function svgLine(data,height,color){if(!data.length)return'';
const h=height||120,padTop=14,padBot=22,padL=8,padR=8;
const w=300;const chartH=h-padTop-padBot;const chartW=w-padL-padR;
const vals=data.map(d=>d.value);
const maxV=Math.max(...vals);const minV=Math.min(...vals);
const range=maxV-minV||1;
// y 좌표 변환 (값이 클수록 위로)
const xy=data.map((d,i)=>{const x=padL+(data.length===1?chartW/2:i/(data.length-1)*chartW);const y=padTop+chartH-((d.value-minV)/range)*chartH;return[x,y];});
// 영역 채우기 (path)
const lineColor=color||'#337EA9';
let area=`M ${xy[0][0]} ${padTop+chartH} L ${xy.map(p=>p.join(' ')).join(' L ')} L ${xy[xy.length-1][0]} ${padTop+chartH} Z`;
let line=`M ${xy.map(p=>p.join(' ')).join(' L ')}`;
let dots=xy.map(([x,y])=>`<circle cx="${x}" cy="${y}" r="3" fill="${lineColor}"/>`).join('');
let labels=data.map((d,i)=>{const x=xy[i][0];return`<text x="${x}" y="${h-6}" text-anchor="middle" font-size="9" fill="#787774">${d.label}</text>`;}).join('');
// 마지막 점에 값 표시
const last=data[data.length-1];const lastX=xy[xy.length-1][0],lastY=xy[xy.length-1][1];
let lastLabel=`<text x="${lastX}" y="${Math.max(lastY-7,padTop)}" text-anchor="end" font-size="10" fill="${lineColor}" font-weight="600">${fmtKRWShort(last.value)}</text>`;
return`<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" style="width:100%;height:${h}px;display:block">
<path d="${area}" fill="${lineColor}" opacity="0.1"/>
<path d="${line}" fill="none" stroke="${lineColor}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
${dots}${labels}${lastLabel}
</svg>`;}

// 비율 막대 (0~1 값들의 배열) - 작은 sparkline 형식
// data: [{value 0-1, label, full?(boolean - 색칠 여부)}]

// 배경 (전체 세로)

// 일일 값 막대 + 평균선 (지출 추이용)
// data: [{label, value, isToday}]

// 활동 히트맵 (GitHub 잔디그래프 스타일) — 1년치
// data: {dateStr: intensity 0-1}
// color: 기본 색상 (intensity가 0~1로 투명도 조절)
function svgHeatmap(data,color){
const today=new Date();today.setHours(0,0,0,0);
// 365일 전부터 오늘까지
const start=new Date(today);start.setDate(today.getDate()-364);
// 시작일을 일요일로 맞춤
const startDay=start.getDay();
start.setDate(start.getDate()-startDay);
// 53주 x 7일
const cellW=12,cellGap=2;
const totalWeeks=Math.ceil(((today-start)/(1000*60*60*24)+1)/7);
const w=totalWeeks*(cellW+cellGap);
const h=7*(cellW+cellGap)+18; // 위쪽 월 라벨 공간
const c=color||'#0F7B6C';
let cells='';let monthLabels='';let lastMonth=-1;
for(let week=0;week<totalWeeks;week++){
for(let day=0;day<7;day++){
const cur=new Date(start);cur.setDate(start.getDate()+week*7+day);
if(cur>today)continue;
const ds=fD(cur);
const intensity=data[ds]||0;
const opacity=intensity===0?0.07:Math.max(0.2,Math.min(1,intensity));
const x=week*(cellW+cellGap);
const y=18+day*(cellW+cellGap);
cells+=`<rect x="${x}" y="${y}" width="${cellW}" height="${cellW}" fill="${c}" opacity="${opacity}" rx="2" data-hd="${ds}"><title>${ds}</title></rect>`;
// 월 라벨 (각 달의 첫째 주)
if(day===0){const mo=cur.getMonth();if(mo!==lastMonth&&cur.getDate()<=7){monthLabels+=`<text x="${x}" y="13" font-size="9" fill="#787774">${mo+1}월</text>`;lastMonth=mo;}}}}
return`<div style="overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:4px">
<svg width="${w}" height="${h}" style="display:block">
${monthLabels}${cells}
</svg></div>
<div style="display:flex;justify-content:flex-end;gap:3px;align-items:center;font-size:10px;color:var(--sub);margin-top:4px">
<span>적음</span>
${[0.07,0.25,0.5,0.75,1].map(o=>`<rect width="11" height="11" rx="2" fill="${c}" opacity="${o}" style="display:inline-block;vertical-align:middle"></rect>`).join('').replace(/<rect /g,'<svg width="11" height="11" style="display:inline-block;vertical-align:middle"><rect ').replace(/><\/rect>/g,'></rect></svg>')}
<span>많음</span>
</div>`;}

function setupAmtInput(el){if(!el)return;
const reformat=()=>{const cursor=el.selectionStart;const oldLen=el.value.length;
const num=parseAmt(el.value);el.value=num?num.toLocaleString('ko-KR'):'';
// 커서 위치 보정 (오른쪽 끝 기준이 아닌 자연스럽게)
const newLen=el.value.length;const newPos=Math.max(0,cursor+(newLen-oldLen));
try{el.setSelectionRange(newPos,newPos);}catch{}};
el.addEventListener('input',reformat);
// 초기 포매팅
if(el.value)reformat();}

function migrateCardLayout(raw){
if(!raw)raw={};
const result={};
['home','money'].forEach(scope=>{

result[scope]={order,hidden};});

function isCardVisible(scope,cardId){return !(S.cardLayout&&S.cardLayout[scope]&&S.cardLayout[scope].hidden&&S.cardLayout[scope].hidden[cardId]);}
function cardOrder(scope){if(!S.cardLayout||!S.cardLayout[scope])return CARD_DEFINITIONS[scope].map(d=>d.id);return S.cardLayout[scope].order;}
function getCardLabel(scope,cardId){const d=CARD_DEFINITIONS[scope].find(x=>x.id===cardId);return d?d.label:cardId;}
function moveCard(scope,fromIdx,toIdx){const order=[...cardOrder(scope)];const[item]=order.splice(fromIdx,1);order.splice(toIdx,0,item);S.cardLayout[scope].order=order;ps();}
function toggleCardHidden(scope,cardId){if(!S.cardLayout[scope].hidden)S.cardLayout[scope].hidden={};S.cardLayout[scope].hidden[cardId]=!S.cardLayout[scope].hidden[cardId];ps();}

// 다음 결제일 계산 — 오늘 기준
function nextChargeDate(sub){if(!sub.active)return null;
const today=new Date();today.setHours(0,0,0,0);
if(sub.cycle==='monthly'){
const day=Math.min(sub.cycleDay||1,28); // 안전하게 28일까지만 (말일 처리는 별도)
let d=new Date(today.getFullYear(),today.getMonth(),sub.cycleDay||1);
// 말일 보정: cycleDay가 31인데 그달이 30일이면 30일
const lastDayOfMonth=new Date(today.getFullYear(),today.getMonth()+1,0).getDate();
d=new Date(today.getFullYear(),today.getMonth(),Math.min(sub.cycleDay||1,lastDayOfMonth));
if(d<today){const next=new Date(today.getFullYear(),today.getMonth()+1,1);const lastNext=new Date(next.getFullYear(),next.getMonth()+1,0).getDate();d=new Date(next.getFullYear(),next.getMonth(),Math.min(sub.cycleDay||1,lastNext));}
return fD(d);}
if(sub.cycle==='yearly'){
const m=(sub.cycleMonth||1)-1;
const lastDayY=new Date(today.getFullYear(),m+1,0).getDate();
let d=new Date(today.getFullYear(),m,Math.min(sub.cycleDay||1,lastDayY));
if(d<today){const lastDayY2=new Date(today.getFullYear()+1,m+1,0).getDate();d=new Date(today.getFullYear()+1,m,Math.min(sub.cycleDay||1,lastDayY2));}
return fD(d);}
return null;}

// 시작일부터 오늘까지 도래한 결제일 모두 (lastGeneratedDate 이후만)
function pendingChargeDates(sub){if(!sub.active)return[];
const today=new Date();today.setHours(0,0,0,0);
const start=pD(sub.startDate);if(!start)return[];
const lastGen=sub.lastGeneratedDate?pD(sub.lastGeneratedDate):null;
const dates=[];
if(sub.cycle==='monthly'){
let cur=new Date(start.getFullYear(),start.getMonth(),Math.min(sub.cycleDay||1,new Date(start.getFullYear(),start.getMonth()+1,0).getDate()));
// start보다 cycleDay가 작으면 다음달부터
if(cur<start)cur=new Date(start.getFullYear(),start.getMonth()+1,Math.min(sub.cycleDay||1,new Date(start.getFullYear(),start.getMonth()+2,0).getDate()));
while(cur<=today){
const ds=fD(cur);
if(!lastGen||cur>lastGen)dates.push(ds);
const ny=cur.getFullYear(),nm=cur.getMonth()+1;
const lastDay=new Date(ny,nm+1,0).getDate();
cur=new Date(ny,nm,Math.min(sub.cycleDay||1,lastDay));}
}else if(sub.cycle==='yearly'){
const m=(sub.cycleMonth||1)-1;
let cur=new Date(start.getFullYear(),m,Math.min(sub.cycleDay||1,new Date(start.getFullYear(),m+1,0).getDate()));
if(cur<start)cur=new Date(start.getFullYear()+1,m,Math.min(sub.cycleDay||1,new Date(start.getFullYear()+1,m+1,0).getDate()));
while(cur<=today){
const ds=fD(cur);
if(!lastGen||cur>lastGen)dates.push(ds);
cur=new Date(cur.getFullYear()+1,m,Math.min(sub.cycleDay||1,new Date(cur.getFullYear()+1,m+1,0).getDate()));}}
return dates;}

// 자동으로 결제일이 도래한 거래 생성 (앱 진입 시 호출)
function generateSubTransactions(){let count=0;
S.subs.forEach(sub=>{if(!sub.active)return;
const dates=pendingChargeDates(sub);
if(!dates.length)return;
dates.forEach(ds=>{
// 기존 거래에 이미 있으면 skip (제목+날짜+금액 동일 = 같은 거래로 간주)
const dup=S.txs.some(t=>t.date===ds&&t.title===sub.name&&t.amount===sub.amount&&t.fixed);
if(dup)return;
const sign=sub.type==='income'?1:-1;
S.txs.push({id:uid(),date:ds,title:sub.name,type:sub.type,amount:sub.amount,accountId:sub.accountId,category:sub.category||'구독',pay:'card',fixed:true,memo:sub.memo||''});
// 잔액 반영
S.accounts=S.accounts.map(a=>a.id===sub.accountId?{...a,balance:(a.balance||0)+sign*sub.amount}:a);
count++;});
// 마지막 생성일 갱신
sub.lastGeneratedDate=dates[dates.length-1];});
return count;}

// 이번 달 고정비 합계 (월간 + 이번달 결제 yearly)
function monthlyFixedSum(ym){
let sum=0;
S.subs.filter(s=>s.active).forEach(s=>{
if(s.cycle==='monthly')sum+=s.type==='income'?-s.amount:s.amount;
else if(s.cycle==='yearly'){const[y,m]=ym.split('-').map(Number);if(s.cycleMonth===m)sum+=s.type==='income'?-s.amount:s.amount;}
});
return sum;}
// 캘린더 이벤트 색상 팔레트 (노션 톤)
const EVENT_COLORS=['#337EA9','#0F7B6C','#9065B0','#D9730D','#E03E3E','#787774','#9F6B53','#CB912F'];
// 통합 일정 소스 — 특정 날짜의 모든 이벤트 모으기
// type별 색상: deadline(프로젝트마감/할일마감)=#0F7B6C, milestone=#CB912F, goal=#9065B0,
//             apply-deadline(입사지원마감)=#0F7B6C, exam=#D9730D, interview=#CB912F, result=#9065B0,

// ── GOAL (저축 목표) ──
// {id,name,targetAmount,targetDate,priority('P0'|'P1'|'P2'),status('active'|'achieved'|'paused'),accountIds:[],memo}
function migrateGoals(raw){if(!raw)return[];return raw.map(g=>({id:g.id||uid(),name:g.name||'',targetAmount:typeof g.targetAmount==='number'?g.targetAmount:0,targetDate:g.targetDate||'',priority:g.priority||'P1',status:g.status||'active',accountIds:Array.isArray(g.accountIds)?g.accountIds:[],memo:g.memo||''}));}
// 현재 모은 금액 = 연결된 계좌의 잔액 합 (부채/비활성 제외)
function goalSaved(g){if(!g.accountIds||!g.accountIds.length)return 0;return g.accountIds.reduce((s,id)=>{const a=accountById(id);if(!a||a.active===false||a.kind==='debt')return s;return s+(a.balance||0);},0);}
function goalProgress(g){const saved=goalSaved(g);const target=g.targetAmount||0;if(!target)return{saved,target,pct:0,remain:0};const pct=Math.min(100,Math.round(saved/target*100));return{saved,target,pct,remain:Math.max(0,target-saved)};}
// 목표일까지 남은 개월 수 (소수 첫째자리, 최소 0.1)
function goalMonthsLeft(g){if(!g.targetDate)return null;const today=new Date();today.setHours(0,0,0,0);const t=pD(g.targetDate);if(!t)return null;const diff=(t-today)/(1000*60*60*24);if(diff<=0)return 0;return Math.max(0.1,Math.round(diff/30.44*10)/10);}
// 월 필요 저축액
function goalMonthlyNeed(g){const ml=goalMonthsLeft(g);const{remain}=goalProgress(g);if(ml==null)return null;if(ml===0)return remain;return Math.ceil(remain/ml);}

// GOAL 달성 예측 — 최근 N일 동안 연결 계좌의 순증가율로 예측
// 반환: {dailyRate, daysToGoal, expectedDate, vsTarget('on'|'late'|'early'|null), comparison}
function goalForecast(g,daysWindow){
const window=daysWindow||30;
if(!g.accountIds||!g.accountIds.length)return null;
const{remain}=goalProgress(g);
if(remain<=0)return null;
const today=new Date();today.setHours(0,0,0,0);
const winStart=new Date(today);winStart.setDate(today.getDate()-window);
const winStartStr=fD(winStart);
// 연결 계좌의 최근 N일간 순흐름 (수입 - 지출)
const flow=S.txs.filter(t=>g.accountIds.includes(t.accountId)&&t.date>=winStartStr).reduce((s,t)=>{
if(t.type==='income'||t.type==='refund')return s+t.amount;
if(t.type==='expense'||t.type==='invest')return s-t.amount;
return s;},0);
if(flow<=0)return{dailyRate:0,daysToGoal:null,expectedDate:null,vsTarget:null};
const dailyRate=flow/window;
const daysToGoal=Math.ceil(remain/dailyRate);
const expectedDate=new Date(today);expectedDate.setDate(today.getDate()+daysToGoal);
let vsTarget=null;let comparison=null;
if(g.targetDate){const target=pD(g.targetDate);if(target){const diffDays=Math.round((expectedDate-target)/(1000*60*60*24));
if(diffDays<-7)vsTarget='early';else if(diffDays>7)vsTarget='late';else vsTarget='on';
comparison=diffDays;}}
return{dailyRate,daysToGoal,expectedDate:fD(expectedDate),vsTarget,comparison};}

// ── 우선순위 조정 모달 트리거 ──
// 우선순위가 비었을 때 모달을 띄울지 결정 (다른 후보가 있을 때만)
// type: 'goal'|'project', fromId: 비운 항목 id, vacatedPri: 'P0'|'P1' 등
function maybeAskPriority(type,fromId,vacatedPri){
const isGoal=type==='goal';
const items=isGoal?S.goals.filter(g=>g.status==='active'&&g.id!==fromId):S.projects.filter(p=>p.status==='active'&&p.id!==fromId);
const order=isGoal?['P0','P1','P2']:['P0','P1','P2','P3'];
const idx=order.indexOf(vacatedPri);
if(idx<0||idx===order.length-1)return false;
// 한 단계 낮은 항목이 1개라도 있으면 모달 띄움
const hasCandidate=items.some(it=>order.indexOf(it.priority)>idx);
if(!hasCandidate)return false;
S.priCtx={type,fromId,vacatedPri};
S.spri=true;
navPush(()=>{S.spri=false;S.priCtx=null;});
return true;}

function categoryExpense(txs){const map={};txs.filter(t=>t.type==='expense'||t.type==='invest').forEach(t=>{const c=t.category||'기타';map[c]=(map[c]||0)+t.amount;});return Object.entries(map).sort((a,b)=>b[1]-a[1]);}

function monthInOut(ym){const txs=txsInMonth(ym);return{income:txs.filter(t=>t.type==='income'||t.type==='refund').reduce((s,t)=>s+t.amount,0),expense:txs.filter(t=>t.type==='expense'||t.type==='invest').reduce((s,t)=>s+t.amount,0)};}

for(let i=0;i<=3;i++){const d=new Date(today);d.setDate(today.getDate()+i);const ds=fD(d);
gEv(ds).forEach(ev=>{

function dDayText(endDate){if(!endDate)return'';const t=new Date();t.setHours(0,0,0,0);const e2=pD(endDate);if(!e2)return'';const diff=Math.round((e2-t)/(1000*60*60*24));if(diff<0)return{txt:'D+'+(-diff),cls:'over'};if(diff===0)return{txt:'D-DAY',cls:'soon'};if(diff<=7)return{txt:'D-'+diff,cls:'soon'};return{txt:'D-'+diff,cls:''};}
function prjProgress(p){const tasks=p.tasks||[];if(!tasks.length)return{done:0,total:0,pct:0};const done=tasks.filter(t=>t.done).length;return{done,total:tasks.length,pct:Math.round(done/tasks.length*100)};}

// 프로젝트 시간 경과율 — startDate ~ endDate 사이에서 오늘이 어디쯤인지
// 반환: {pct(0-100, 진행 시간 비율), totalDays, passedDays, isLongTerm}
function prjTimeProgress(p){
if(!p.startDate||!p.endDate)return{pct:null,isLongTerm:false};
const start=pD(p.startDate);const end=pD(p.endDate);if(!start||!end)return{pct:null,isLongTerm:false};
const today=new Date();today.setHours(0,0,0,0);
const totalMs=end-start;const passedMs=today-start;
if(totalMs<=0)return{pct:null,isLongTerm:false};
const totalDays=Math.round(totalMs/(1000*60*60*24));
const passedDays=Math.max(0,Math.round(passedMs/(1000*60*60*24)));
const pct=Math.max(0,Math.min(100,Math.round(passedMs/totalMs*100)));
return{pct,totalDays,passedDays,isLongTerm:totalDays>=30};}
function msProgress(p,msId){const tasks=(p.tasks||[]).filter(t=>t.milestoneId===msId);if(!tasks.length)return{done:0,total:0,pct:0};const done=tasks.filter(t=>t.done).length;return{done,total:tasks.length,pct:Math.round(done/tasks.length*100)};}

function rMoTxs(){
const ym=curMonth();
const allMonthTxs=txsInMonth(ym);
const catFilter=S.txCatFilter||null;
const search=(S.txSearch||'').toLowerCase().trim();
let monthTxs=catFilter?allMonthTxs.filter(t=>(t.category||'기타')===catFilter):allMonthTxs;
if(search){monthTxs=monthTxs.filter(t=>{const hay=((t.title||'')+' '+(t.memo||'')+' '+(t.category||'')).toLowerCase();return hay.includes(search);});}
const sorted=[...monthTxs].sort((a,b)=>(b.date||'').localeCompare(a.date||''));
const txsByDate={};
sorted.forEach(t=>{(txsByDate[t.date]=txsByDate[t.date]||[]).push(t);});

const income=monthTxs.filter(t=>t.type==='income'||t.type==='refund').reduce((s,t)=>s+t.amount,0);
const expense=monthTxs.filter(t=>t.type==='expense'||t.type==='invest').reduce((s,t)=>s+t.amount,0);

// 카테고리별 합계 (전체 거래 기준, 필터 무시)

// 카테고리 필터 칩 (전체 + 카테고리별)
const catChips=catRows.length?`<div style="display:flex;gap:4px;margin-bottom:10px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:2px"><button class="${!catFilter?'active':''}" data-txcatf="" style="padding:5px 11px;border-radius:14px;font-size:11px;color:${!catFilter?'var(--text)':'var(--sub)'};background:${!catFilter?'var(--al)':'transparent'};white-space:nowrap;border:1px solid ${!catFilter?'var(--text)':'var(--border)'};font-weight:${!catFilter?'600':'400'}">전체</button>${catRows.map(([cat,v])=>`<button data-txcatf="${e(cat)}" style="padding:5px 11px;border-radius:14px;font-size:11px;color:${catFilter===cat?'var(--text)':'var(--sub)'};background:${catFilter===cat?'var(--al)':'transparent'};white-space:nowrap;border:1px solid ${catFilter===cat?'var(--text)':'var(--border)'};font-weight:${catFilter===cat?'600':'400'}">${e(cat)} (${fmtKRWShort(v)})</button>`).join('')}</div>`:'';

// 카테고리별 합계 (접이식)
const catSummary=catRows.length?`<details style="margin-bottom:14px;background:#fff;border:1px solid var(--border);border-radius:10px"><summary style="padding:10px 14px;cursor:pointer;font-size:12px;font-weight:600;color:var(--text);list-style:none;display:flex;justify-content:space-between;align-items:center"><span>카테고리별 지출 합계</span><span style="font-size:11px;color:var(--sub);font-weight:400">▼</span></summary><div style="padding:0 14px 12px">${catRows.map(([cat,v])=>{const pct=Math.round(v/totalExp*100);return`<div style="margin-bottom:6px"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px"><span>${e(cat)}</span><span style="color:var(--sub)">${fmtKRWShort(v)} · ${pct}%</span></div><div class="pb" style="height:4px"><div class="pf" style="width:${pct}%;background:var(--text)"></div></div></div>`;}).join('')}</div></details>`:'';

return`<div class="mo-month-nav">
<button data-momn="-1">←</button>
<div class="lbl">${ym.replace('-','년 ')}월</div>
<button data-momn="1">→</button>
</div>

</div>
<div style="display:flex;gap:6px;margin-bottom:10px;align-items:center"><input id="txSearchIn" placeholder="제목/메모/카테고리 검색" value="${e(S.txSearch||'')}" style="flex:1;padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;background:#fff">${S.txSearch?`<button id="txSearchClear" style="padding:8px 12px;color:var(--sub);background:transparent;border:1px solid var(--border);border-radius:8px;font-size:11px">초기화</button>`:''}</div>
${catSummary}
${catChips}
${(()=>{
// 카테고리 필터 활성 시 → 그 카테고리의 6개월 추이 막대
if(!catFilter)return'';
const today=new Date();
const months=[];
for(let i=5;i>=0;i--){const d=new Date(today.getFullYear(),today.getMonth()-i,1);
const ymKey=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
const monthTxsAll=txsInMonth(ymKey);
const catTxs=monthTxsAll.filter(t=>(t.category||'기타')===catFilter&&(t.type==='expense'||t.type==='invest'));
const sum=catTxs.reduce((s,t)=>s+t.amount,0);
months.push({label:String(d.getMonth()+1)+'월',value:sum,date:ymKey});}
const hasData=months.some(m=>m.value>0);
if(!hasData)return'';
const total=months.reduce((s,m)=>s+m.value,0);
const avg=total/6;
const thisMonth=months[months.length-1].value;
const prevMo=months[months.length-2].value;
const change=prevMo>0?Math.round((thisMonth-prevMo)/prevMo*100):null;
return`<div style="background:#fff;border:1px solid var(--border);border-radius:12px;padding:14px 12px 6px;margin-bottom:10px">

${change!=null?`<span style="font-weight:600;font-size:11px;color:${change>=0?'#E03E3E':'#0F7B6C'}">전월 대비 ${change>=0?'+':''}${change}%</span>`:''}
</div>
${svgDailyBars(months.map((m,i)=>({label:m.label,value:m.value,isToday:i===months.length-1})),100,'#E03E3E',avg)}

<span>이번 달 <span style="color:${thisMonth>avg*1.3?'#E03E3E':'var(--text)'};font-weight:600">${fmtKRW(thisMonth)}</span></span>

function rPriM(){const ctx=S.priCtx;if(!ctx)return'';

const items=isGoal?S.goals.filter(g=>g.status==='active'&&g.id!==ctx.fromId):S.projects.filter(p=>p.status==='active'&&p.id!==ctx.fromId);

const candidatePri=idx>=0&&idx<order.length-1?order[idx+1]:null;
// 후보 = 한 단계 낮은 우선순위 (그것만 추천)

// 그 외 = 더 낮은 항목들도 선택 가능
const others=items.filter(it=>order.indexOf(it.priority)>=idx+1).filter(it=>!candidates.includes(it));

return`<div class="mo" id="priMo"><div class="mb" style="max-height:90vh">

${candidates.length?`<div class="dl-section-label" style="margin-bottom:8px">추천 (${candidatePri})</div>

${candidates.map(it=>`<button data-prisel="${it.id}">${e(it.name)} <span style="opacity:.6">(${it.priority})</span></button>`).join('')}
</div>`:''}
${others.length?`<div class="dl-section-label" style="margin-bottom:8px">그 외</div>
<div class="todo-edit-chips" style="margin-bottom:14px">
${others.map(it=>`<button data-prisel="${it.id}">${e(it.name)} <span style="opacity:.6">(${it.priority})</span></button>`).join('')}

</div></div>`;}

function rCl(){

// 월간 뷰
function rClMonth(ms,td){const y=S.cy,m=S.cm,fd=new Date(y,m,1).getDay(),dm=new Date(y,m+1,0).getDate();
let cl='';for(let i=0;i<fd;i++)cl+=`<div class="ccl" style="cursor:default"></div>`;
for(let d=1;d<=dm;d++){const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`,ev=gEv(ds),it=sD(new Date(y,m,d),td),sl=ds===S.cs,dw=new Date(y,m,d).getDay();let nc='cnm';if(it)nc+=' ctd';else if(dw===0)nc+=' csn';else if(dw===6)nc+=' cst';
let dt=ev.length?'<div class="cdt">'+ev.slice(0,3).map(x=>`<div class="cdot" style="background:${x.color}"></div>`).join('')+(ev.length>3?`<span style="font-size:8px;color:var(--sub)">+${ev.length-3}</span>`:'')+`</div>`:'';
cl+=`<div class="ccl ${sl?'csl':''}" data-cd="${ds}"><span class="${nc}">${d}</span>${dt}</div>`;}

// 이번 달 요약 카드
const monthStart=`${y}-${String(m+1).padStart(2,'0')}-01`;
const monthEnd=`${y}-${String(m+1).padStart(2,'0')}-${String(dm).padStart(2,'0')}`;
const monthEvents=collectEventsBetween(monthStart,monthEnd);
const summaryCard=monthEvents.length?renderSummaryCard('이번 달 주요 일정',monthEvents,5):'';

let evH='';if(S.cs){const sd=pD(S.cs),se=gEv(S.cs);evH=renderDayDetail(sd,se);}

return`<div class="cln"><button data-cn="-1">←</button><h2>${y}년 ${ms[m]}</h2><button data-cn="1">→</button></div>
${summaryCard}
<div class="cgr"><div class="chd">${DY.map(d=>`<div>${d}</div>`).join('')}</div><div class="cbd">${cl}</div></div>
${evH}`;}

// 주간 뷰 — 7일 가로 + 각 날짜 아래 일정 목록
function rClWeek(ms,td){const base=S.cs?pD(S.cs):td;const day=base.getDay();const start=new Date(base);start.setDate(base.getDate()-day);const end=new Date(start);end.setDate(start.getDate()+6);

const weekEvents=collectEventsBetween(startStr,endStr);

let html='';
for(let i=0;i<7;i++){const d=new Date(start);d.setDate(start.getDate()+i);const ds=fD(d);const ev=gEv(ds);const it=sD(d,td);const dw=d.getDay();let dCol=dw===0?'#E03E3E':dw===6?'#337EA9':'var(--text)';
const dayTodos=S.todos.filter(t=>t.date===ds);

<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:${(ev.length||dayTodos.length)?'8':'0'}px">
<div style="font-size:13px;font-weight:600;color:${dCol}">${d.getMonth()+1}/${d.getDate()} (${DY[dw]}) ${it?'<span style="font-size:10px;background:var(--text);color:#fff;padding:1px 6px;border-radius:8px;margin-left:4px">오늘</span>':''}</div>
<span style="font-size:11px;color:var(--sub)">${ev.length?'일정 '+ev.length:''}${ev.length&&dayTodos.length?' · ':''}${dayTodos.length?'할 일 '+doneCount+'/'+dayTodos.length:''}</span>
</div>
${ev.length?ev.slice(0,3).map(x=>`<div style="display:flex;align-items:center;gap:6px;font-size:12px;margin-top:4px"><div style="width:6px;height:6px;border-radius:3px;background:${x.color};flex-shrink:0"></div><span style="color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${e(x.label)}</span></div>`).join(''):''}
${ev.length>3?`<div style="font-size:10px;color:var(--sub);margin-top:4px;padding-left:12px">+${ev.length-3}개 일정 더</div>`:''}
${dayTodos.length?`<div style="margin-top:${ev.length?'8':'0'}px;padding-top:${ev.length?'6':'0'}px;${ev.length?'border-top:1px dashed var(--border)':''}">
${dayTodos.slice(0,3).map(t=>`<div style="display:flex;align-items:center;gap:6px;font-size:12px;margin-top:3px">
<div style="width:11px;height:11px;border:1.5px solid ${t.done?'var(--accent)':'var(--border)'};${t.done?'background:var(--accent)':''};border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center">${t.done?'<span style="color:#fff;font-size:8px;font-weight:700">✓</span>':''}</div>
<span style="color:${t.done?'var(--sub)':'var(--text)'};overflow:hidden;text-overflow:ellipsis;white-space:nowrap;${t.done?'text-decoration:line-through':''}">${t.priority?'★ ':''}${e(t.text)}</span>
</div>`).join('')}
${dayTodos.length>3?`<div style="font-size:10px;color:var(--sub);margin-top:4px;padding-left:17px">+${dayTodos.length-3}개 할 일 더</div>`:''}
</div>`:''}
</div>`;}

return`<div class="cln"><button data-cn="-1">←</button><h2>${start.getMonth()+1}/${start.getDate()} ~ ${end.getMonth()+1}/${end.getDate()}</h2><button data-cn="1">→</button></div>
${summaryCard}
${html}`;}

// 기간 내 모든 이벤트 수집 (요약용)
function collectEventsBetween(startStr,endStr){const result=[];const start=pD(startStr);const end=pD(endStr);if(!start||!end)return result;
const cur=new Date(start);while(cur<=end){const ds=fD(cur);const evs=gEv(ds);evs.forEach(x=>result.push({...x,date:ds}));cur.setDate(cur.getDate()+1);}return result;}

function initDrag(listId,dragAttr,handleAttr,arr,arrKey){
const list=document.getElementById(listId);if(!list)return;
let dragId=null;
list.querySelectorAll(`[${dragAttr}]`).forEach(el=>{
const id=el.getAttribute(dragAttr);
el.addEventListener('dragstart',ev=>{dragId=id;el.classList.add('dragging');ev.dataTransfer.effectAllowed='move';});
el.addEventListener('dragend',()=>{el.classList.remove('dragging');list.querySelectorAll('.drag-over').forEach(x=>x.classList.remove('drag-over'));});
el.addEventListener('dragover',ev=>{ev.preventDefault();list.querySelectorAll('.drag-over').forEach(x=>x.classList.remove('drag-over'));if(el.getAttribute(dragAttr)!==dragId)el.classList.add('drag-over');});
el.addEventListener('dragleave',()=>{el.classList.remove('drag-over');});
el.addEventListener('drop',ev=>{ev.preventDefault();el.classList.remove('drag-over');const toId=el.getAttribute(dragAttr);if(!dragId||dragId===toId)return;
const fi=arr.findIndex(x=>x.id===dragId),ti2=arr.findIndex(x=>x.id===toId);
if(fi>=0&&ti2>=0){const item=arr.splice(fi,1)[0];arr.splice(ti2,0,item);ps();R();}});
// Touch
let touchY=0,clone=null,curOver=null;
const handle=el.querySelector(`[${handleAttr}]`);if(!handle)return;
handle.addEventListener('touchstart',ev2=>{ev2.preventDefault();dragId=id;touchY=ev2.touches[0].clientY;
clone=el.cloneNode(true);clone.style.cssText='position:fixed;left:16px;right:16px;top:'+el.getBoundingClientRect().top+'px;z-index:90;opacity:.8;pointer-events:none;box-shadow:0 4px 16px rgba(0,0,0,.15);';
document.body.appendChild(clone);el.classList.add('dragging');},{passive:false});
handle.addEventListener('touchmove',ev2=>{ev2.preventDefault();if(!clone)return;const ty=ev2.touches[0].clientY;clone.style.top=(el.getBoundingClientRect().top+(ty-touchY))+'px';
list.querySelectorAll('.drag-over').forEach(x=>x.classList.remove('drag-over'));
const target=document.elementFromPoint(ev2.touches[0].clientX,ty);if(target){const row=target.closest(`[${dragAttr}]`);if(row&&row.getAttribute(dragAttr)!==dragId){row.classList.add('drag-over');curOver=row.getAttribute(dragAttr);}else curOver=null;}
},{passive:false});
handle.addEventListener('touchend',()=>{if(clone){clone.remove();clone=null;}el.classList.remove('dragging');list.querySelectorAll('.drag-over').forEach(x=>x.classList.remove('drag-over'));
if(curOver&&dragId&&curOver!==dragId){const fi=arr.findIndex(x=>x.id===dragId),ti2=arr.findIndex(x=>x.id===curOver);
if(fi>=0&&ti2>=0){const item=arr.splice(fi,1)[0];arr.splice(ti2,0,item);ps();R();}}
dragId=null;curOver=null;});
});}

// ── INIT: IndexedDB에서 파일 로드 후 시작 ──
(async function(){
  // 기존 localStorage 파일 데이터 마이그레이션
  const oldFiles=localStorage.getItem('bw-f');
  if(oldFiles){try{const parsed=JSON.parse(oldFiles);S.files=parsed;await idbSave(parsed);localStorage.removeItem('bw-f');}catch{}}
  // IndexedDB에서 로드
  const f=await idbLoad();
  if(f&&Object.keys(f).length)S.files=f;
  // 프로젝트가 한 번도 저장된 적 없으면 시드 데이터 주입 (이후엔 사용자 데이터 유지)
  if(localStorage.getItem(K.p)===null){S.projects=migrateProjects(seedProjects());sv(K.p,S.projects);}
  // 입사지원 데이터는 있는데 'pc-job' 카테고리가 없으면 복구 (진입 경로 보호)
  if(S.jobs.length&&!pcatById('pc-job')){S.pcats=[{id:'pc-job',name:'취업',color:'#337EA9'},...S.pcats];sv(K.pc,S.pcats);}
  // 정기구독 자동 거래 생성 (앱 진입 시 1회)
  if(S.subs&&S.subs.length){const generated=generateSubTransactions();if(generated)ps();}
  S.ready=true;

  // ── 뒤로가기(popstate) 처리 ──
  // 화면이 깊어질 때마다 navPush()를 부르고, 뒤로가기 시 한 단계씩 되돌림
  // 각 단계의 "되돌리는 함수"를 스택으로 관리
  window.navStack=[];
  let navStack=window.navStack;

  // 단계 추가 — 화면이 깊어지는 시점에 부름
  // backFn: 뒤로가기 시 실행할 되돌림 동작
  window.navPush=function(backFn){
    navStack.push(backFn);
    history.pushState({brainy:'depth-'+navStack.length},'');
  };

  // 모달 열기용 헬퍼: 어떤 모달이든 navPush로 등록하면, 뒤로가기 시 그 모달만 자동으로 닫힘
  // 사용: openModal(()=>{ S.sjf=true; ... S.pf=[]; }, ()=>{ S.sjf=false; S.pf=[]; })
  window.openModal=function(openFn,closeFn){
    openFn();
    navPush(closeFn);
  };

  // 외부에서 명시적으로 한 단계 뒤로 (UI 버튼용은 그냥 history.back() 호출하면 됨)

  // 초기 가짜 이력 1칸 (가장 바깥 종료 가드)
  history.replaceState({brainy:'root'},'');
  history.pushState({brainy:'guard'},'');

  window.addEventListener('popstate',function(ev){
    if(navStack.length>0){
      // 가장 최근 단계의 되돌림 함수 실행
      const backFn=navStack.pop();
      try{backFn();}catch(e){console.warn('back fn err',e);}
      R();
      // 가드 이력 다시 채우기 (다음 뒤로가기 받기 위해)
      history.pushState({brainy:'guard'},'');
    }else{
      // 스택이 비어있음 — 진짜 종료 허용
      // (브라우저가 자연스럽게 처리)
    }
  });

  R();
})();
</script>
